name: Release JS CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate Cursor assets
        run: node scripts/validate_cursor_assets.mjs

      - name: Install CLI dependencies
        working-directory: packages/cli-js
        run: npm install

      - name: Verify tag version matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./packages/cli-js/package.json').version")"
          echo "Tag version: ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "Tag version and package version must match."
            exit 1
          fi

      - name: Build CLI
        working-directory: packages/cli-js
        run: npm run build

      - name: Verify npm package contents
        working-directory: packages/cli-js
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/cli-js
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}