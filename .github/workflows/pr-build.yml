name: PR Build Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-js:
    name: Build JS CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: packages/cli-js/pnpm-lock.yaml

      - name: Validate Cursor assets
        run: node scripts/validate_cursor_assets.mjs

      - name: Install CLI dependencies
        working-directory: packages/cli-js
        run: pnpm install

      - name: Build CLI
        working-directory: packages/cli-js
        run: pnpm run build

  build-py:
    name: Build Python CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: pip install hatchling editables

      - name: Install planforge-core from repo
        run: pip install -e packages/core

      - name: Build and verify Python CLI
        working-directory: packages/cli-py
        run: pip install --no-build-isolation -e .
