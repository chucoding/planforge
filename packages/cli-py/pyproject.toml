[build-system]
requires = ["hatchling", "editables"]
build-backend = "hatchling.build"

[project]
name = "planforge"
version = "0.1.7"
description = "PlanForge CLI - Bring your own AI to Cursor"
requires-python = ">=3.10"
dependencies = [
    "planforge-core",
    "click>=8.0",
    "rich>=13.0",
    "readchar>=4.0",
]

[project.scripts]
planforge = "planforge.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["planforge"]
